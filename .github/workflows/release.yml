name: Release Claude Plugin

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      PLUGIN_ID: securable
      DIST_DIR: dist

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Build plugin zip and sha
        run: bash scripts/build_plugin_zip.sh "${GITHUB_REF_NAME}"

      - name: Generate release marketplace manifest
        run: bash scripts/generate_marketplace_json.sh "${GITHUB_REF_NAME}"

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/securable-${{ github.ref_name }}.zip
            dist/securable-${{ github.ref_name }}.zip.sha256
            dist/marketplace.json
